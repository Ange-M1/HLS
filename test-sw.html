<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Worker Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-black flex flex-col items-center justify-center p-4 font-sans text-gray-100">
    <div class="bg-gray-800 rounded-xl shadow-2xl p-6 md:p-8 w-full max-w-4xl">
        <h1 class="text-3xl font-extrabold text-white mb-6 text-center">Service Worker Test</h1>
        
        <div class="mb-6">
            <h2 class="text-xl font-semibold text-white mb-4">Test HLS Request Interception</h2>
            <button id="testButton" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg">
                Test HLS Request
            </button>
        </div>
        
        <div id="results" class="bg-gray-700 p-4 rounded-lg">
            <h3 class="text-lg font-semibold text-white mb-2">Results:</h3>
            <div id="resultContent" class="text-gray-300"></div>
        </div>
    </div>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('Service Worker registered:', registration);
                    document.getElementById('resultContent').innerHTML += '<p class="text-green-400">✓ Service Worker registered successfully</p>';
                })
                .catch(error => {
                    console.error('Service Worker registration failed:', error);
                    document.getElementById('resultContent').innerHTML += '<p class="text-red-400">✗ Service Worker registration failed: ' + error.message + '</p>';
                });
        }

        // Test HLS request interception
        document.getElementById('testButton').addEventListener('click', async () => {
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = '<p class="text-blue-400">Testing HLS request interception...</p>';
            
            try {
                // Test manifest request
                const manifestUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
                console.log('Testing manifest request:', manifestUrl);
                
                const response = await fetch(manifestUrl);
                if (response.ok) {
                    resultContent.innerHTML += '<p class="text-green-400">✓ Manifest request successful</p>';
                } else {
                    resultContent.innerHTML += '<p class="text-red-400">✗ Manifest request failed</p>';
                }
                
                // Test segment request
                const segmentUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz_00001.ts';
                console.log('Testing segment request:', segmentUrl);
                
                const segmentResponse = await fetch(segmentUrl);
                if (segmentResponse.ok) {
                    resultContent.innerHTML += '<p class="text-green-400">✓ Segment request successful</p>';
                } else {
                    resultContent.innerHTML += '<p class="text-red-400">✗ Segment request failed</p>';
                }
                
            } catch (error) {
                console.error('Test failed:', error);
                resultContent.innerHTML += '<p class="text-red-400">✗ Test failed: ' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
