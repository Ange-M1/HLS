<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video Stream</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 to-indigo-900 flex flex-col items-center justify-center p-4 font-sans text-gray-100">

    <div class="bg-gray-800 rounded-xl shadow-2xl p-6 md:p-8 w-full max-w-2xl flex flex-col items-center border border-indigo-700">
        <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-6 text-center">
            My Video Stream
        </h1>

        <div class="w-full mb-6 text-center">
            <p id="networkStatus" class="text-lg font-medium text-green-400">
                Network Status: Online
            </p>
            <p id="networkMessage" class="text-sm text-gray-400 mt-2"></p>
        </div>

        <div id="videoPlayerContainer" class="flex flex-col items-center justify-center bg-gray-900 rounded-lg shadow-lg p-4 w-full h-full max-w-xl mx-auto">
            <h3 id="videoTitle" class="text-xl font-semibold text-white mb-4 text-center"></h3>
            <div class="relative w-full aspect-video bg-black rounded-md overflow-hidden">
                <div id="videoLoadingOverlay" class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-75 text-white text-lg z-10 hidden">
                    Loading...
                </div>
                <video
                    id="videoElement"
                    controls
                    autoplay
                    playsinline
                    class="w-full h-full object-contain rounded-md"
                >
                    Your browser does not support the video tag.
                </video>
                <div id="noVideoSource" class="absolute inset-0 flex items-center justify-center bg-gray-800 text-gray-400 text-lg rounded-md hidden">
                    No video source available.
                </div>
            </div>
            <p id="videoMessage" class="mt-4 text-gray-300 text-sm text-center"></p>
        </div>

        <div class="flex justify-center space-x-4 mt-8 w-full">
            <button
                id="prevButton"
                class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-full shadow-lg transform transition duration-200 ease-in-out hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75"
            >
                Previous
            </button>
            <button
                id="nextButton"
                class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-full shadow-lg transform transition duration-200 ease-in-out hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75"
            >
                Next
            </button>
        </div>

        <!-- Video Upload Section -->
        <div class="mt-8 w-full">
            <h2 class="text-2xl font-semibold text-white mb-4 text-center">Upload Video for HLS Segmentation</h2>
            <div class="bg-gray-700 rounded-lg p-4">
                <form id="uploadForm" enctype="multipart/form-data" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Select Video File</label>
                        <input type="file" id="videoFile" name="video" accept="video/*" required
                               class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-md text-white file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Segment Duration (seconds)</label>
                            <input type="number" id="segmentDuration" name="segmentDuration" value="6" min="2" max="30"
                                   class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-md text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Output Name</label>
                            <input type="text" id="outputName" name="outputName" placeholder="my-video"
                                   class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-md text-white">
                        </div>
                    </div>
                    <button type="submit" id="uploadBtn" 
                            class="w-full px-4 py-2 bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-bold rounded-full shadow-lg transition duration-200 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-75">
                        Upload & Segment Video
                    </button>
                </form>
                <div id="uploadProgress" class="mt-4 hidden">
                    <div class="bg-gray-600 rounded-full h-2">
                        <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <p id="uploadStatus" class="text-sm text-gray-300 mt-2">Uploading...</p>
                </div>
            </div>
        </div>

        <!-- Available Videos Section -->
        <div class="mt-8 w-full">
            <h2 class="text-2xl font-semibold text-white mb-4 text-center">Available HLS Streams</h2>
            <div id="availableVideosList" class="space-y-4">
                <p class="text-gray-400 text-center text-sm">No HLS streams available yet.</p>
            </div>
            <button
                id="refreshVideosButton"
                class="mt-4 w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-full shadow-lg transition duration-200 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75"
            >
                Refresh Video List
            </button>
        </div>

        <!-- Cached Segments Section -->
        <div class="mt-8 w-full">
            <h2 class="text-2xl font-semibold text-white mb-4 text-center">Cached Segments</h2>
            <div id="cachedVideosList" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <p class="text-gray-400 text-center text-sm">No segments cached yet.</p>
            </div>
            <button
                id="clearCacheButton"
                class="mt-4 w-full px-4 py-2 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold rounded-full shadow-lg transition duration-200 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-75"
            >
                Clear Cache
            </button>
        </div>
    </div>

    <!-- HLS.js library -->
    <script src="hls.min.js"></script>
    <!-- IndexedDB library for caching -->
    <script src="https://unpkg.com/idb@7/build/umd.js"></script>
    <!-- Link to external JavaScript file -->
    <script src="main.js"></script>
</body>
</html>
