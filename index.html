<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video Stream</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 to-indigo-900 flex flex-col items-center justify-center p-4 font-sans text-gray-100">

    <div class="bg-gray-800 rounded-xl shadow-2xl p-6 md:p-8 w-full max-w-2xl flex flex-col items-center border border-indigo-700">
        <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-6 text-center">
            My Video Stream
        </h1>

        <div class="w-full mb-6 text-center">
            <p id="networkStatus" class="text-lg font-medium text-green-400">
                Network Status: Online
            </p>
            <p id="networkMessage" class="text-sm text-gray-400 mt-2"></p>
        </div>

        <div id="videoPlayerContainer" class="flex flex-col items-center justify-center bg-gray-900 rounded-lg shadow-lg p-4 w-full h-full max-w-xl mx-auto">
            <h3 id="videoTitle" class="text-xl font-semibold text-white mb-4 text-center"></h3>
            <div class="relative w-full aspect-video bg-black rounded-md overflow-hidden">
                <div id="videoLoadingOverlay" class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-75 text-white text-lg z-10 hidden">
                    Loading...
                </div>
                <video
                    id="videoElement"
                    controls
                    autoplay
                    playsinline
                    class="w-full h-full object-contain rounded-md"
                >
                    Your browser does not support the video tag.
                </video>
                <div id="noVideoSource" class="absolute inset-0 flex items-center justify-center bg-gray-800 text-gray-400 text-lg rounded-md hidden">
                    No video source available.
                </div>
            </div>
            <p id="videoMessage" class="mt-4 text-gray-300 text-sm text-center"></p>
        </div>

        <div class="flex justify-center space-x-4 mt-8 w-full">
            <button
                id="prevButton"
                class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-full shadow-lg transform transition duration-200 ease-in-out hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75"
            >
                Previous
            </button>
            <button
                id="nextButton"
                class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-full shadow-lg transform transition duration-200 ease-in-out hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75"
            >
                Next
            </button>
        </div>

        <!-- HLS Controls -->
        <div class="mt-6 w-full">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                <button
                    id="preloadBtn"
                    class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow-lg transition duration-200"
                >
                    Preload Segments
                </button>
                <button
                    id="analyzeBtn"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-lg transition duration-200"
                >
                    Analyze Stream
                </button>
                <button
                    id="downloadSegmentBtn"
                    class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg shadow-lg transition duration-200"
                >
                    Download Segment
                </button>
            </div>
        </div>

        <!-- Stream Information -->
        <div class="mt-6 w-full bg-gray-700 rounded-lg p-4">
            <h3 class="text-lg font-semibold text-white mb-3">Stream Information</h3>
            <div id="streamInfo" class="text-sm text-gray-300 space-y-1">
                <p>Status: <span id="hlsStatus" class="text-yellow-400">Not loaded</span></p>
                <p>Quality: <span id="currentQuality" class="text-blue-400">-</span></p>
                <p>Segments: <span id="segmentCount" class="text-green-400">0</span></p>
                <p>Current Segment: <span id="currentSegment" class="text-purple-400">-</span></p>
            </div>
        </div>

        <!-- Segment Management -->
        <div class="mt-6 w-full">
            <h2 class="text-2xl font-semibold text-white mb-4 text-center">HLS Segments</h2>
            <div class="mb-4 flex flex-wrap gap-2 justify-center">
                <button id="showAllSegments" class="px-3 py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded transition">All</button>
                <button id="showCachedSegments" class="px-3 py-1 bg-green-600 hover:bg-green-700 text-white text-sm rounded transition">Cached</button>
                <button id="showPendingSegments" class="px-3 py-1 bg-yellow-600 hover:bg-yellow-700 text-white text-sm rounded transition">Pending</button>
            </div>
            <div id="segmentsList" class="max-h-64 overflow-y-auto bg-gray-700 rounded-lg p-4">
                <p class="text-gray-400 text-center text-sm">No segments loaded yet.</p>
            </div>
            <div class="mt-4 flex gap-2">
                <button
                    id="clearCacheButton"
                    class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold rounded-lg shadow-lg transition duration-200 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-75"
                >
                    Clear Cache
                </button>
                <button
                    id="refreshSegments"
                    class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-lg transition duration-200"
                >
                    Refresh
                </button>
            </div>
        </div>
    </div>

    <!-- Include required libraries -->
    <script src="https://unpkg.com/idb@7/build/umd.js"></script>
    <script src="hls.min.js"></script>
    <!-- Link to external JavaScript file -->
    <script src="main.js"></script>
</body>
</html>
